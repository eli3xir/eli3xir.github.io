<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>液态玻璃 · 创意实验室</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a1428'/%3E%3Ctext x='16' y='23' font-size='18' text-anchor='middle'%3E🫧%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/pages.css">
  <style>
    .glass-stage { position: fixed; inset: 0; overflow: hidden; background: #0a1428; }
    /* 背景活内容：渐变团 + 大字 + 卡片 */
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.75; animation: drift 14s ease-in-out infinite alternate; }
    .b1 { width: 46vw; height: 46vw; background: #7c5cff; left: -10vw; top: -12vw; }
    .b2 { width: 38vw; height: 38vw; background: #00e5c0; right: -8vw; top: 22vh; animation-delay: -4s; }
    .b3 { width: 30vw; height: 30vw; background: #ff2d78; left: 28vw; bottom: -14vw; animation-delay: -8s; }
    @keyframes drift { to { transform: translate(6vw, -4vh) scale(1.15); } }
    .stage-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; text-align: center; pointer-events: none;
    }
    .stage-text h2 {
      font-size: clamp(3rem, 11vw, 8.5rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1;
      background: linear-gradient(110deg, #fff 25%, #8adfff 60%, #c8a2ff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stage-text p { color: rgba(255,255,255,0.75); font-size: clamp(1rem, 2.4vw, 1.4rem); }
    .stage-cards { display: flex; gap: 18px; pointer-events: auto; }
    .stage-card {
      width: 180px; padding: 18px; border-radius: 14px;
      background: rgba(255,255,255,0.92); color: #1a2030;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      transform: rotate(-2deg);
    }
    .stage-card:nth-child(2) { transform: rotate(1.6deg); }
    .stage-card:nth-child(3) { transform: rotate(-1deg); }
    .stage-card h4 { font-size: 0.95rem; margin-bottom: 6px; }
    .stage-card p { font-size: 0.78rem; color: #5a6070; line-height: 1.5; }
    .stage-card button {
      margin-top: 10px; font-size: 0.75rem; padding: 5px 14px;
      border: none; border-radius: 999px; background: #7c5cff; color: #fff; cursor: pointer;
    }
    .stage-card button:active { transform: scale(0.94); }

    /* 液态玻璃透镜：backdrop-filter 引用 SVG 位移滤镜，折射活 DOM */
    .lens {
      position: fixed; z-index: 6;
      width: 340px; height: 220px;
      border-radius: 32px;
      backdrop-filter: url(#liquid) saturate(1.4) brightness(1.12);
      -webkit-backdrop-filter: url(#liquid) saturate(1.4) brightness(1.12);
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.55),
        inset 0 -1px 2px rgba(255,255,255,0.15),
        0 22px 60px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .lens.small { width: 190px; height: 190px; border-radius: 50%; }
    /* 不支持 backdrop-filter:url() 的浏览器降级为磨砂 */
    @supports not (backdrop-filter: url(#x)) {
      .lens { backdrop-filter: blur(10px) saturate(1.4); -webkit-backdrop-filter: blur(10px) saturate(1.4); background: rgba(255,255,255,0.08); }
    }
  </style>
</head>
<body class="demo-body">
  <!-- SVG 液态滤镜 -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="liquid">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="4" result="n">
        <animate attributeName="baseFrequency" values="0.012 0.018;0.017 0.013;0.012 0.018" dur="9s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="34" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="glass-stage">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="stage-text">
      <h2>LIQUID GLASS</h2>
      <p>透镜下面是完全活着的 DOM：文字、按钮、动画——全部被实时折射</p>
      <div class="stage-cards">
        <div class="stage-card">
          <h4>真·DOM 卡片</h4>
          <p>这不是截图。透镜移过来时，你会看到这张卡被"液体"扭曲。</p>
          <button onclick="this.textContent='点到了！'">点我试试</button>
        </div>
        <div class="stage-card">
          <h4>SVG 位移滤镜</h4>
          <p>feTurbulence + feDisplacementMap，9 秒周期的流动噪声。</p>
          <button onclick="this.textContent='也能点'">交互正常</button>
        </div>
        <div class="stage-card">
          <h4>零 WebGL</h4>
          <p>纯 CSS backdrop-filter 实现，兼容降级为磨砂玻璃。</p>
          <button onclick="this.textContent='✓'">可用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="lens" id="lens1"></div>
  <div class="lens small" id="lens2"></div>

  <div class="demo-hud">
    <h1>🫧 液态玻璃</h1>
    <p>移动鼠标，两块液态透镜实时折射底下的活页面 · 灵感来自 HTML-in-Canvas</p>
  </div>
  <a class="demo-back" href="/lab/">← 返回实验室</a>

  <script src="/js/lab-glass.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
